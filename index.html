<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Singer OS</title>
<style>
:root {
  /* OKLCH Color System - perceptually uniform */
  --bg: oklch(0.10 0.01 260);
  --bg2: oklch(0.13 0.01 260);
  --card: oklch(0.17 0.01 260);
  --card2: oklch(0.20 0.01 260);
  --border: oklch(0.28 0.01 260);
  --border-hi: oklch(0.35 0.02 260);
  
  /* Primary - Indigo */
  --pri: oklch(0.65 0.20 270);
  --pri-hi: oklch(0.72 0.18 270);
  --pri-dim: oklch(0.55 0.22 270);
  --pri-glow: oklch(0.65 0.20 270 / 0.15);
  --pri-glow-hi: oklch(0.65 0.20 270 / 0.30);
  
  /* Semantic */
  --ok: oklch(0.72 0.18 145);
  --ok-dim: oklch(0.60 0.20 145);
  --warn: oklch(0.78 0.16 60);
  --err: oklch(0.65 0.20 25);
  --gold: oklch(0.82 0.16 95);
  
  /* Text */
  --tx: oklch(0.95 0.01 260);
  --tx2: oklch(0.70 0.01 260);
  --tx3: oklch(0.48 0.01 260);
  
  /* Typography Scale */
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  --xs: 0.6875rem;
  --sm: 0.8125rem;
  --base: 0.9375rem;
  --md: 1.0625rem;
  --lg: 1.25rem;
  --xl: 1.5rem;
  --2xl: 1.875rem;
  --3xl: 2.25rem;
  
  /* Spacing Scale */
  --s1: 4px;
  --s2: 8px;
  --s3: 12px;
  --s4: 16px;
  --s5: 20px;
  --s6: 24px;
  --s7: 32px;
  --s8: 40px;
  --s9: 48px;
  
  /* Radius */
  --r-sm: 8px;
  --r: 12px;
  --r-lg: 16px;
  --r-xl: 20px;
  --r-full: 9999px;
  
  /* Elevation */
  --shadow-sm: 0 1px 3px oklch(0 0 0 / 0.3);
  --shadow: 0 4px 12px oklch(0 0 0 / 0.4);
  --shadow-lg: 0 8px 24px oklch(0 0 0 / 0.5);
  --shadow-glow: 0 0 20px var(--pri-glow);
  
  /* Motion */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --dur-fast: 150ms;
  --dur: 250ms;
  --dur-slow: 400ms;
}

/* Font Loading */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html {
  color-scheme: dark;
  -webkit-tap-highlight-color: transparent;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--tx);
  font-size: var(--base);
  line-height: 1.6;
  min-height: 100vh;
  padding-bottom: 88px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Reduced Motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: var(--r-full); }

/* Screen System */
.sc { display: none; min-height: calc(100vh - 88px); }
.sc.active { display: block; animation: fadeIn var(--dur) var(--ease-out) both; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

@keyframes glow {
  0%, 100% { box-shadow: 0 0 8px var(--pri-glow); }
  50% { box-shadow: 0 0 20px var(--pri-glow-hi); }
}

@keyframes confetti {
  0% { transform: scale(0) rotate(0deg); opacity: 0; }
  50% { transform: scale(1.2) rotate(180deg); opacity: 1; }
  100% { transform: scale(1) rotate(360deg); opacity: 1; }
}

/* Top Bar */
.tb {
  position: sticky;
  top: 0;
  z-index: 100;
  background: oklch(0.10 0.01 260 / 0.92);
  backdrop-filter: blur(12px) saturate(1.4);
  -webkit-backdrop-filter: blur(12px) saturate(1.4);
  border-bottom: 1px solid var(--border);
  padding: var(--s4) var(--s5);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.tb-t {
  font-size: var(--md);
  font-weight: 800;
  letter-spacing: -0.02em;
}
.tb-r {
  font-size: var(--sm);
  color: var(--gold);
  font-weight: 600;
  font-family: var(--font-mono);
}

/* Screen Padding */
.sp { padding: var(--s5) var(--s4) var(--s9); max-width: 540px; margin: 0 auto; }

/* Bottom Navigation */
.bn {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  background: oklch(0.12 0.01 260 / 0.95);
  backdrop-filter: blur(16px) saturate(1.6);
  -webkit-backdrop-filter: blur(16px) saturate(1.6);
  border-top: 1px solid var(--border);
  height: 72px;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.bn-in {
  display: flex;
  justify-content: space-around;
  align-items: center;
  height: 100%;
  max-width: 500px;
  margin: 0 auto;
  padding: 0 var(--s2);
}
.bn-i {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: var(--s2) var(--s3);
  color: var(--tx3);
  font-size: var(--xs);
  font-weight: 600;
  text-decoration: none;
  border-radius: var(--r-sm);
  transition: color var(--dur-fast), background var(--dur-fast);
  min-width: 48px;
  min-height: 48px;
  justify-content: center;
  cursor: pointer;
  border: none;
  background: none;
  font-family: var(--font);
}
.bn-i:hover { color: var(--tx2); background: oklch(0.20 0.01 260 / 0.5); }
.bn-i.on { color: var(--pri); }
.bn-i.on:hover { background: var(--pri-glow); }
.bn-ic {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 1px;
}
.bn-ic svg { width: 22px; height: 22px; stroke-width: 1.8; }

/* Cards */
.c {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: var(--s5);
  margin-bottom: var(--s3);
  transition: border-color var(--dur), box-shadow var(--dur), transform var(--dur-fast);
}
.c:hover {
  border-color: var(--border-hi);
  box-shadow: var(--shadow-sm);
}
.c:active { transform: scale(0.98); }
.c-a { border-color: oklch(0.65 0.20 270 / 0.25); background: linear-gradient(135deg, var(--card), oklch(0.65 0.20 270 / 0.04)); }
.c-a:hover { border-color: oklch(0.65 0.20 270 / 0.4); box-shadow: var(--shadow-glow); }
.c-g { border-color: oklch(0.82 0.16 95 / 0.2); }
.c-g:hover { border-color: oklch(0.82 0.16 95 / 0.35); }
.c-ok { border-color: oklch(0.72 0.18 145 / 0.25); }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--s2);
  padding: var(--s3) var(--s5);
  border-radius: var(--r);
  font-weight: 700;
  font-size: var(--sm);
  font-family: var(--font);
  width: 100%;
  margin-bottom: var(--s2);
  cursor: pointer;
  border: none;
  transition: all var(--dur-fast) var(--ease-out);
  min-height: 48px;
  letter-spacing: -0.01em;
  position: relative;
  overflow: hidden;
}
.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, oklch(1 0 0 / 0.08), transparent);
  pointer-events: none;
}
.btn:hover { transform: translateY(-1px); }
.btn:active { transform: translateY(0) scale(0.98); }
.btn:disabled { opacity: 0.4; pointer-events: none; }

.btn-p {
  background: linear-gradient(135deg, var(--pri), var(--pri-dim));
  color: #fff;
  box-shadow: 0 2px 8px var(--pri-glow);
}
.btn-p:hover { box-shadow: 0 4px 16px var(--pri-glow-hi); }

.btn-s {
  background: linear-gradient(135deg, var(--ok), var(--ok-dim));
  color: oklch(0.15 0.01 260);
  box-shadow: 0 2px 8px oklch(0.72 0.18 145 / 0.2);
}
.btn-s:hover { box-shadow: 0 4px 16px oklch(0.72 0.18 145 / 0.3); }

.btn-g {
  background: transparent;
  color: var(--tx2);
  border: 1px solid var(--border);
}
.btn-g:hover { background: var(--card2); color: var(--tx); border-color: var(--border-hi); }

.btn-w {
  background: transparent;
  color: var(--tx3);
  border: 1px solid var(--border);
  font-weight: 500;
}
.btn-w:hover { color: var(--tx2); }

/* Tags */
.tag {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: var(--r-full);
  font-size: var(--xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.tag-p { background: var(--pri-glow); color: var(--pri-hi); }
.tag-s { background: oklch(0.72 0.18 145 / 0.1); color: var(--ok); }
.tag-g { background: oklch(0.82 0.16 95 / 0.1); color: var(--gold); }
.tag-w { background: oklch(0.78 0.16 60 / 0.1); color: var(--warn); }

/* Progress Bars */
.pr {
  height: 8px;
  background: var(--border);
  border-radius: var(--r-full);
  overflow: hidden;
  position: relative;
}
.pr-f {
  height: 100%;
  background: linear-gradient(90deg, var(--pri-dim), var(--pri));
  border-radius: var(--r-full);
  transition: width var(--dur-slow) var(--ease-out);
  position: relative;
}
.pr-f::after {
  content: '';
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 20px;
  background: linear-gradient(90deg, transparent, oklch(1 0 0 / 0.15));
  border-radius: var(--r-full);
}
.pr-ok .pr-f { background: linear-gradient(90deg, var(--ok-dim), var(--ok)); }
.pr-g .pr-f { background: linear-gradient(90deg, oklch(0.70 0.14 95), var(--gold)); }

/* List Items */
.li {
  display: flex;
  align-items: center;
  gap: var(--s4);
  padding: var(--s4);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  margin-bottom: var(--s2);
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-out);
  min-height: 56px;
}
.li:hover {
  border-color: var(--border-hi);
  background: var(--card2);
  transform: translateX(2px);
}
.li:active { transform: scale(0.98); }
.li-ic {
  width: 44px;
  height: 44px;
  border-radius: var(--r);
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--pri-glow);
  color: var(--pri);
  flex-shrink: 0;
  font-weight: 800;
  font-size: var(--sm);
}
.li-ic svg { width: 20px; height: 20px; stroke-width: 1.8; }
.li-b { flex: 1; min-width: 0; }
.li-t { font-weight: 700; font-size: var(--sm); letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.li-sub { font-size: var(--xs); color: var(--tx3); margin-top: 1px; }
.li-r { font-size: var(--xs); color: var(--gold); font-weight: 700; font-family: var(--font-mono); flex-shrink: 0; }

/* Sections */
.sec { margin-bottom: var(--s6); }
.sec-h {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: var(--s3);
}
.sec-t {
  font-size: var(--xs);
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--tx3);
}

/* Hero */
.hero { padding: var(--s5) 0 var(--s6); }
.hero h1 {
  font-size: var(--2xl);
  font-weight: 900;
  letter-spacing: -0.03em;
  line-height: 1.1;
  margin-bottom: var(--s2);
}
.hero p { color: var(--tx2); font-size: var(--sm); }

/* Quiz Options */
.qo {
  display: flex;
  align-items: center;
  gap: var(--s3);
  padding: var(--s4);
  border: 2px solid var(--border);
  border-radius: var(--r);
  margin-bottom: var(--s2);
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-out);
  min-height: 52px;
}
.qo:hover { border-color: var(--border-hi); background: var(--card); }
.qo.sel { border-color: var(--pri); background: var(--pri-glow); }
.qo.ok { border-color: var(--ok); background: oklch(0.72 0.18 145 / 0.08); }
.qo.err { border-color: var(--err); background: oklch(0.65 0.20 25 / 0.08); }
.qo.dis { pointer-events: none; opacity: 0.6; }
.qr {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid var(--border);
  flex-shrink: 0;
  transition: all var(--dur-fast);
  display: flex;
  align-items: center;
  justify-content: center;
}
.qo.sel .qr { background: var(--pri); border-color: var(--pri); }
.qo.ok .qr { background: var(--ok); border-color: var(--ok); }
.qo.err .qr { background: var(--err); border-color: var(--err); }
.qr::after {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #fff;
  opacity: 0;
  transition: opacity var(--dur-fast);
}
.qo.sel .qr::after, .qo.ok .qr::after, .qo.err .qr::after { opacity: 1; }

/* Exercise Steps */
.es {
  display: flex;
  gap: var(--s3);
  padding: var(--s4) 0;
  border-bottom: 1px solid var(--border);
  align-items: flex-start;
}
.es:last-child { border-bottom: none; }
.esn {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--xs);
  font-weight: 800;
  background: var(--pri-glow);
  color: var(--pri);
  flex-shrink: 0;
  margin-top: 2px;
}
.est { flex: 1; }
.est p { font-size: var(--sm); color: var(--tx2); line-height: 1.5; }

/* Toast / Feedback */
.ft {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-200%);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: var(--s3) var(--s5);
  z-index: 9999;
  font-size: var(--sm);
  font-weight: 600;
  box-shadow: var(--shadow-lg);
  transition: transform var(--dur) var(--ease-spring);
  max-width: 90vw;
  text-align: center;
}
.ft.show { transform: translateX(-50%) translateY(0); }
.ft-ok { border-color: var(--ok); color: var(--ok); }
.ft-err { border-color: var(--err); color: var(--err); }
.ft-info { border-color: var(--pri); color: var(--pri); }

/* Grid helpers */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s2); }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: var(--s2); }

/* Text helpers */
.text-center { text-align: center; }
.text-sm { font-size: var(--sm); }
.text-xs { font-size: var(--xs); }
.text-muted { color: var(--tx3); }
.text-pri { color: var(--pri); }
.text-ok { color: var(--ok); }
.text-gold { color: var(--gold); }
.text-warn { color: var(--warn); }
.text-err { color: var(--err); }
.text-bold { font-weight: 700; }
.text-mono { font-family: var(--font-mono); }
.mb-1 { margin-bottom: var(--s1); }
.mb-2 { margin-bottom: var(--s2); }
.mb-3 { margin-bottom: var(--s3); }
.mb-4 { margin-bottom: var(--s4); }
.mt-2 { margin-top: var(--s2); }
.mt-4 { margin-top: var(--s4); }
.gap-2 { gap: var(--s2); }
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.w-full { width: 100%; }

/* Input */
.input {
  width: 100%;
  padding: var(--s3) 0;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--tx);
  font-family: var(--font);
  font-size: var(--base);
  transition: border-color var(--dur-fast);
  outline: none;
}
.input:focus { border-color: var(--pri); }
.input::placeholder { color: var(--tx3); }
label {
  display: block;
  font-size: var(--xs);
  color: var(--tx3);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: var(--s1);
}

/* Badge */
.badge {
  display: inline-flex;
  align-items: center;
  gap: var(--s1);
  padding: var(--s1) var(--s3);
  border-radius: var(--r-full);
  font-size: var(--xs);
  font-weight: 700;
  background: var(--card2);
  border: 1px solid var(--border);
}

/* Level indicator */
.level-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--pri), var(--pri-dim));
  color: #fff;
  font-weight: 900;
  font-size: var(--sm);
  box-shadow: 0 2px 8px var(--pri-glow);
}

/* Streak flame */
.streak { display: inline-flex; align-items: center; gap: var(--s1); }

/* Achievement popup */
.achieve {
  position: fixed;
  inset: 0;
  z-index: 10000;
  display: none;
  align-items: center;
  justify-content: center;
  background: oklch(0 0 0 / 0.7);
  backdrop-filter: blur(4px);
}
.achieve.show { display: flex; }
.achieve-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: var(--s7);
  text-align: center;
  max-width: 320px;
  animation: confetti 0.5s var(--ease-spring) both;
}
.achieve-icon { font-size: 3rem; margin-bottom: var(--s3); }
.achieve-title { font-size: var(--lg); font-weight: 800; margin-bottom: var(--s2); }
.achieve-desc { color: var(--tx2); font-size: var(--sm); margin-bottom: var(--s5); }

/* Vocal load bar */
.vocal-load {
  height: 6px;
  background: var(--border);
  border-radius: var(--r-full);
  overflow: hidden;
  margin: var(--s2) 0;
}
.vocal-load-f {
  height: 100%;
  border-radius: var(--r-full);
  transition: width var(--dur-slow) var(--ease-out), background var(--dur);
}
.vocal-load-f.ok { background: var(--ok); }
.vocal-load-f.warn { background: var(--warn); }
.vocal-load-f.danger { background: var(--err); }

/* Divider */
.hr { height: 1px; background: var(--border); margin: var(--s4) 0; }

/* Reference box */
.ref-box {
  background: oklch(0.65 0.20 270 / 0.06);
  border: 1px solid oklch(0.65 0.20 270 / 0.15);
  border-radius: var(--r);
  padding: var(--s4);
  margin: var(--s3) 0;
}
.ref-box-title {
  font-size: var(--xs);
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--pri);
  margin-bottom: var(--s2);
}

/* Song card */
.song-card {
  display: flex;
  align-items: center;
  gap: var(--s4);
  padding: var(--s4);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  margin-bottom: var(--s2);
  cursor: pointer;
  transition: all var(--dur-fast);
}
.song-card:hover { border-color: var(--border-hi); background: var(--card2); }
.song-art {
  width: 52px;
  height: 52px;
  border-radius: var(--r-sm);
  background: linear-gradient(135deg, var(--pri-glow), var(--card2));
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: var(--lg);
}
.song-info { flex: 1; min-width: 0; }
.song-title { font-weight: 700; font-size: var(--sm); }
.song-artist { font-size: var(--xs); color: var(--tx3); }
.song-tags { display: flex; gap: var(--s1); margin-top: var(--s1); flex-wrap: wrap; }

/* Difficulty dots */
.dots { display: flex; gap: 3px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
.dot.filled { background: var(--pri); }
.dot.ok { background: var(--ok); }

/* Coach message */

// ============================================================
// AUTH GATE — Email + WhatsApp collection before access
// ============================================================
var AUTH = {
  isAuthed: false,
  email: '',
  whatsapp: '',
  ip: '',
  token: '',

  init: function() {
    // Check if already registered on this device
    try {
      var stored = localStorage.getItem('singerOS_auth');
      if (stored) {
        var d = JSON.parse(stored);
        if (d.email && d.token) {
          this.isAuthed = true;
          this.email = d.email;
          this.whatsapp = d.whatsapp || '';
          this.token = d.token;
          return true;
        }
      }
    } catch(e) {}
    return false;
  },

  register: function(email, whatsapp, name) {
    if (!email || email.indexOf('@') === -1) {
      toast('Enter a valid email address', 'err');
      return false;
    }
    if (!whatsapp || whatsapp.length < 10) {
      toast('Enter your WhatsApp number (with country code)', 'err');
      return false;
    }
    if (!name || name.length < 2) {
      toast('Enter your name', 'err');
      return false;
    }

    // Generate unique token
    var raw = email + Date.now() + Math.random().toString(36).slice(2);
    this.token = btoa(raw).slice(0, 24);
    this.email = email;
    this.whatsapp = whatsapp;
    this.isAuthed = true;

    // Store locally
    try {
      localStorage.setItem('singerOS_auth', JSON.stringify({
        email: email,
        whatsapp: whatsapp,
        name: name,
        token: this.token,
        registered: new Date().toISOString()
      }));
    } catch(e) {}

    // Submit to Google Sheet
    this.submitToSheet(name, email, whatsapp);

    // Get IP
    this.fetchIP();

    return true;
  },

  submitToSheet: function(name, email, whatsapp) {
    // Submit registration data to Google Sheet via Sheets API
    var self = this;
    var xhr = new XMLHttpRequest();
    xhr.open('POST', 'https://sheets.googleapis.com/v4/spreadsheets/1P9zZYOwKDaARmyGsfEyEhcwMoMX-tW0yTPAHNiMHB18/values/Registrations!A:F:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS', true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.timeout = 10000;
    xhr.onreadystatechange = function() {
      if (xhr.readyState === 4) {
        if (xhr.status === 200) {
          console.log('Registration saved to sheet');
        } else {
          console.log('Sheet save failed, storing locally for retry');
          // Store in localStorage for later retry
          try {
            var pending = JSON.parse(localStorage.getItem('singerOS_pending_regs') || '[]');
            pending.push({name: name, email: email, whatsapp: whatsapp, token: self.token, timestamp: new Date().toISOString()});
            localStorage.setItem('singerOS_pending_regs', JSON.stringify(pending));
          } catch(e) {}
        }
      }
    };
    var now = new Date().toISOString();
    xhr.send(JSON.stringify({
      values: [[now, name, email, whatsapp, this.ip || 'unknown', this.token]]
    }));
  },

  fetchIP: function() {
    // Use a free IP API — best effort, non-blocking
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'https://api.ipify.org?format=json', true);
    xhr.timeout = 5000;
    xhr.onreadystatechange = function() {
      if (xhr.readyState === 4 && xhr.status === 200) {
        try {
          var d = JSON.parse(xhr.responseText);
          AUTH.ip = d.ip;
          // Store IP with auth
          var stored = JSON.parse(localStorage.getItem('singerOS_auth') || '{}');
          stored.ip = d.ip;
          localStorage.setItem('singerOS_auth', JSON.stringify(stored));
        } catch(e) {}
      }
    };
    xhr.send();
  },

  logout: function() {
    this.isAuthed = false;
    this.email = '';
    this.whatsapp = '';
    this.token = '';
    try { localStorage.removeItem('singerOS_auth'); } catch(e) {}
  },

  // Generate a shareable link with token embedded
  getLink: function() {
    var base = window.location.origin + window.location.pathname;
    return base + '?t=' + this.token + '&e=' + encodeURIComponent(this.email);
  },

  // Check if URL has a token (shared link)
  checkURLToken: function() {
    var params = new URLSearchParams(window.location.search);
    var t = params.get('t');
    var e = params.get('e');
    if (t && e) {
      // Someone visited via shared link — require their OWN registration
      // Do NOT auto-login with shared token
      return { shared: true, token: t, email: decodeURIComponent(e) };
    }
    return { shared: false };
  }
};

  // Autocorrelation pitch detection
  detectPitch: function(buffer, sampleRate) {
    var bufLen = buffer.length;
    var correlations = new Float32Array(bufLen);
    
    // RMS check — is there enough signal?
    var rms = 0;
    for (var i = 0; i < bufLen; i++) rms += buffer[i] * buffer[i];
    rms = Math.sqrt(rms / bufLen);
    if (rms < 0.01) return null; // Too quiet
    
    // Autocorrelation
    for (var lag = 0; lag < bufLen; lag++) {
      var sum = 0;
      for (var j = 0; j < bufLen - lag; j++) {
        sum += buffer[j] * buffer[j + lag];
      }
      correlations[lag] = sum;
    }
    
    // Find first peak after initial decay
    var found = false;
    var firstPeak = 0;
    for (var lag = 1; lag < bufLen - 1; lag++) {
      if (correlations[lag] > correlations[lag - 1] && correlations[lag] > correlations[lag + 1]) {
        if (!found) { firstPeak = lag; found = true; }
        if (lag > firstPeak + 10) break;
      }
    }
    
    if (!found || firstPeak < 10) return null;
    return sampleRate / firstPeak;
  },
  
  // Convert frequency to note name + cents
  freqToNote: function(freq) {
    var midi = 12 * Math.log2(freq / 440) + 69;
    var midiRound = Math.round(midi);
    var cents = Math.round((midi - midiRound) * 100);
    var octave = Math.floor(midiRound / 12);
    var noteName = this.noteNames[midiRound % 12];
    return { name: noteName, octave: octave, cents: cents, freq: freq, midi: midiRound };
  },
  
  start: function(targetNoteName) {
    if (this.isRunning) this.stop();
    this.init();
    this.targetNote = targetNoteName;
    
    var self = this;
    navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
      self.stream = stream;
      self.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      var source = self.audioCtx.createMediaStreamSource(stream);
      self.analyser = self.audioCtx.createAnalyser();
      self.analyser.fftSize = 2048;
      source.connect(self.analyser);
      self.isRunning = true;
      self.loop();
    }).catch(function(err) {
      toast('Microphone access denied. Allow mic to use pitch detector.', 'err');
    });
  },
  
  loop: function() {
    if (!this.isRunning) return;
    var self = this;
    var buffer = new Float32Array(this.analyser.fftSize);
    this.analyser.getFloatTimeDomainData(buffer);
    
    var freq = this.detectPitch(buffer, this.audioCtx.sampleRate);
    if (freq) {
      var note = this.freqToNote(freq);
      onPitchDetected(note);
    }
    
    requestAnimationFrame(function() { self.loop(); });
  },
  
  stop: function() {
    this.isRunning = false;
    if (this.stream) {
      this.stream.getTracks().forEach(function(t) { t.stop(); });
    }
    if (this.audioCtx) {
      this.audioCtx.close();
    }
    this.stream = null;
    this.audioCtx = null;
  }

// PITCH DETECTION ENGINE — Real-time pitch via Web Audio API
// ============================================================
var PitchEngine = {
  audioCtx: null,
  analyser: null,
  stream: null,
  isRunning: false,
  targetNote: null,
  
  // Note frequencies (A4 = 440Hz standard tuning),
  noteNames: ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'],
  
  init: function() {
    // Calculate frequencies for all notes (C0 to B8)
    for (var oct = 0; oct < 9; oct++) {
      for (var n = 0; n < 12; n++) {
        var midi = (oct * 12) + n;
        var freq = 440 * Math.pow(2, (midi - 69) / 12);
        this.noteFreqs[midi] = freq;
      }
    }
  },
  
  // Autocorrelation pitch detection
  detectPitch: function(buffer, sampleRate) {
    var bufLen = buffer.length;
    var correlations = new Float32Array(bufLen);
    
    // RMS check — is there enough signal?
    var rms = 0;
    for (var i = 0; i < bufLen; i++) rms += buffer[i] * buffer[i];
    rms = Math.sqrt(rms / bufLen);
    if (rms < 0.01) return null; // Too quiet
    
    // Autocorrelation
    for (var lag = 0; lag < bufLen; lag++) {
      var sum = 0;
      for (var j = 0; j < bufLen - lag; j++) {
        sum += buffer[j] * buffer[j + lag];
      }
      correlations[lag] = sum;
    }
    
    // Find first peak after initial decay
    var found = false;
    var firstPeak = 0;
    for (var lag = 1; lag < bufLen - 1; lag++) {
      if (correlations[lag] > correlations[lag - 1] && correlations[lag] > correlations[lag + 1]) {
        if (!found) { firstPeak = lag; found = true; }
        if (lag > firstPeak + 10) break;
      }
    }
    
    if (!found || firstPeak < 10) return null;
    return sampleRate / firstPeak;
  },
  
  // Convert frequency to note name + cents
  freqToNote: function(freq) {
    var midi = 12 * Math.log2(freq / 440) + 69;
    var midiRound = Math.round(midi);
    var cents = Math.round((midi - midiRound) * 100);
    var octave = Math.floor(midiRound / 12);
    var noteName = this.noteNames[midiRound % 12];
    return { name: noteName, octave: octave, cents: cents, freq: freq, midi: midiRound };
  },
  
  start: function(targetNoteName) {
    if (this.isRunning) this.stop();
    this.init();
    this.targetNote = targetNoteName;
    
    var self = this;
    navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
      self.stream = stream;
      self.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      var source = self.audioCtx.createMediaStreamSource(stream);
      self.analyser = self.audioCtx.createAnalyser();
      self.analyser.fftSize = 2048;
      source.connect(self.analyser);
      self.isRunning = true;
      self.loop();
    }).catch(function(err) {
      toast('Microphone access denied. Allow mic to use pitch detector.', 'err');
    });
  },
  
  loop: function() {
    if (!this.isRunning) return;
    var self = this;
    var buffer = new Float32Array(this.analyser.fftSize);
    this.analyser.getFloatTimeDomainData(buffer);
    
    var freq = this.detectPitch(buffer, this.audioCtx.sampleRate);
    if (freq) {
      var note = this.freqToNote(freq);
      onPitchDetected(note);
    }
    
    requestAnimationFrame(function() { self.loop(); });
  },
  
  stop: function() {
    this.isRunning = false;
    if (this.stream) {
      this.stream.getTracks().forEach(function(t) { t.stop(); });
    }
    if (this.audioCtx) {
      this.audioCtx.close();
    }
    this.stream = null;
    this.audioCtx = null;
  }
};

    h += '<div class="text-xs text-muted mb-2">Target Note</div>';
    h += '<select id="pitch-target-note" style="background:var(--bg2);color:var(--tx);border:1px solid var(--border);border-radius:var(--r);padding:var(--s2);font-size:1rem">';
    h += '<option value="C4">C4 (Middle C)</option>';
    h += '<option value="D4">D4</option>';
    h += '<option value="E4">E4</option>';
    h += '<option value="F4">F4</option>';
    h += '<option value="G4">G4</option>';
    h += '<option value="A4">A4 (440Hz)</option>';
    h += '<option value="B4">B4</option>';
    h += '</select></div>';
    h += '<div id="pitch-score" class="text-sm mt-2"></div>';
    h += '</div>';
    h += '<button class="btn btn-s" onclick="finishQD(\'pitch\')">Done (+10 XP)</button>';
  } else {
    h += '<p class="text-muted text-sm mb-4">Do this now. Tap when done.</p>';
    h += '<div class="c c-a">';
    for (var i = 0; i < d.steps.length; i++) {
      h += '<div class="es"><div class="esn">' + (i + 1) + '</div><div class="est"><p>' + d.steps[i] + '</p></div></div>';
    }
    h += '</div>';

  }
  c.innerHTML = h;
  go('session');

  if (skill === 'pitch') {
    // Set up pitch detection callback
    var targetSelect = document.getElementById('pitch-target-note');
    var targetNote = targetSelect ? targetSelect.value : 'C4';
    if (targetSelect) {
      targetSelect.onchange = function() { targetNote = this.value; };
    }
    var targetFreq = noteNameToFreq(targetNote);

    onPitchDetected = function(note) {
      var display = document.getElementById('pitch-note');
      var centsDisplay = document.getElementById('pitch-cents');
      var bar = document.getElementById('pitch-bar');
      if (!display) return;

      display.textContent = note.name + note.octave;
      var cents = note.cents;
      centsDisplay.textContent = (cents === 0 ? '✓ Perfect!' : (cents > 0 ? '+' + cents + ' cents (sharp)' : cents + ' cents (flat)'));

      // Meter: -50 to +50 cents mapped to 0-100%
      var pct = Math.max(0, Math.min(100, 50 + (cents / 50) * 50));
      bar.style.width = pct + '%';
      if (Math.abs(cents) < 10) {
        bar.style.background = 'var(--ok)';
        centsDisplay.style.color = 'var(--ok)';
      } else if (Math.abs(cents) < 25) {
        bar.style.background = 'var(--gold)';
        centsDisplay.style.color = 'var(--gold)';
      } else {
        bar.style.background = 'var(--err)';
        centsDisplay.style.color = 'var(--err)';
      }

      // Score tracking
      if (!window.pitchScore) window.pitchScore = { attempts: 0, inTune: 0 };
      window.pitchScore.attempts++;
      if (Math.abs(cents) < 15) window.pitchScore.inTune++;
      var scoreDiv = document.getElementById('pitch-score');
      if (scoreDiv) {
        var accuracy = window.pitchScore.attempts > 0 ? Math.round(window.pitchScore.inTune / window.pitchScore.attempts * 100) : 0;
        scoreDiv.textContent = 'Score: ' + window.pitchScore.inTune + '/' + window.pitchScore.attempts + ' in tune (' + accuracy + '%)';
      }
    };
  }
}

function noteNameToFreq(name) {
  var notes = { 'C':0, 'C#':1, 'D':2, 'D#':3, 'E':4, 'F':5, 'F#':6, 'G':7, 'G#':8, 'A':9, 'A#':10, 'B':11 };
  var note = name.replace(/\d/, '');
  var oct = parseInt(name.replace(/\D/g, ''));
  var midi = (oct * 12) + (notes[note] || 0);
  return 440 * Math.pow(2, (midi - 69) / 12);
}

function startPitchDrill() {
  window.pitchScore = { attempts: 0, inTune: 0 };

  U.xp += 15;
  U.vocalLoad = Math.min(U.maxLoad, U.vocalLoad + 10);
  if (U.skills[skill] !== undefined) U.skills[skill] = Math.min(10, U.skills[skill] + 1);
  U.sessions++;
  U.diagnosticResults.push({skill: skill, date: new Date().toISOString()});
  save();
  showAchieve('💪', 'Exercise Complete!', '+15 XP. ' + COACH.say('encouragement', {name: U.name}));
  go('practice');
}

// ============================================================
// SONG VIEWER
// ============================================================
function openSong(id) {
  var s = null;
  for (var i = 0; i < SONGS.length; i++) { if (SONGS[i].id === id) { s = SONGS[i]; break; } }
  if (!s) return;
  var done = U.completedSongs.indexOf(id) !== -1;
  var c = document.getElementById('v-c');
  var h = '';
  h += '<button class="btn btn-w" style="width:auto;padding:var(--s2) var(--s4);min-height:36px;font-size:var(--xs)" onclick="go(\'songs\')">← Back</button>';
  h += '<div style="margin-top:var(--s4)">';
  h += '<span class="tag tag-g mb-2">Level ' + s.level + '</span>';
  h += '<h1 style="font-size:var(--xl);font-weight:900;letter-spacing:-0.02em;margin:var(--s2) 0">' + s.title + '</h1>';
  h += '<p class="text-muted text-sm mb-4">' + s.artist + '</p></div>';
  h += '<div style="display:flex;gap:var(--s1);flex-wrap:wrap;margin-bottom:var(--s4)">';
  for (var t = 0; t < s.tags.length; t++) {
    h += '<span class="tag tag-p" style="font-size:0.6rem">' + s.tags[t] + '</span>';
  }
  h += '</div>';
  h += '<div class="c c-a"><h3 style="font-size:var(--sm);font-weight:800;margin-bottom:var(--s2)">Your Focus</h3><p class="text-sm">' + s.focus + '</p></div>';
  h += '<div class="ref-box"><div class="ref-box-title">YouTube Reference</div><p class="text-sm text-muted">' + s.ref + '</p></div>';
  if (done) {
    h += '<div class="c c-ok text-center"><div style="font-size:1.5rem">✓</div><div class="text-bold">Song Practiced</div></div>';
  } else {
    h += '<button class="btn btn-p" onclick="practiceSong(\'' + id + '\')">I Sang It (+50 XP)</button>';
  }
  c.innerHTML = h;
  go('session');
}

function practiceSong(id) {
  U.xp += 50;
  U.vocalLoad = Math.min(U.maxLoad, U.vocalLoad + 15);
  U.sessions++;
  if (U.completedSongs.indexOf(id)
 === -1) U.completedSongs.push(id);
  save();
  showAchieve('🎵', 'Song Complete!', '+50 XP. ' + COACH.say('encouragement', {name: U.name}));
  go('songs');
}

// ============================================================
// MILLIONAIRE QUIZ
// ============================================================
var QUIZ_QUESTIONS = [
  { q: 'What is the term for the space between two notes?', options: ['Interval', 'Chord', 'Scale', 'Octave'], answer: 0, prize: 100 },
  { q: 'How many beats does a whole note get in 4/4 time?', options: ['1', '2', '3', '4'], answer: 3, prize: 200 },
  { q: 'What does "forte" (f) mean in music?', options: ['Soft', 'Loud', 'Fast', 'Slow'], answer: 1, prize: 300 },
  { q: 'What is the home key of a song called?', options: ['Dominant', 'Tonic', 'Subdominant', 'Modulation'], answer: 1, prize: 500 },
  { q: 'What is the relative minor of C major?', options: ['A minor', 'E minor', 'G minor', 'D minor'], answer: 0, prize: 1000 },
  { q: 'Which vocal register is the lowest for most singers?', options: ['Falsetto', 'Chest voice', 'Head voice', 'Whistle'], answer: 1, prize: 2000 },
  { q: 'What is a "glottal stop"?', options: ['A type of breath', 'A vocal fold closure', 'A resonance technique', 'A singing style'], answer: 1, prize: 5000 },
  { q: 'What does "appoggio" mean in singing?', options: ['Breath support', 'Vowel placement', 'Larynx control', 'Resonance'], answer: 0, prize: 10000 },
  { q: 'What is the interval between C and G?', options: ['Major 3rd', 'Perfect 4th', 'Perfect 5th', 'Major 6th'], answer: 2, prize: 25000 },
  { q: 'In solfege, what syllable represents the 5th scale degree?', options: ['Mi', 'Fa', 'Sol', 'La'], answer: 2, prize: 50000 },
  { q: 'What is the term for singing multiple notes on one syllable?', options: ['Vibrato', 'Melisma', 'Staccato', 'Legato'], answer: 1, prize: 75000 },
  { q: "What is the 'passaggio' in singing?", options: ['A song section', 'A register break', 'A breathing technique', 'A style'], answer: 1, prize: 100000 },
  { q: 'What is the harmonic series?', options: ['A chord progression', 'Overtones above a fundamental', 'A scale pattern', 'A rhythm pattern'], answer: 1, prize: 250000 },
  { q: 'Which form is AABA most associated with?', options: ['Sonata', '32-bar song form', 'Rondo', 'Theme and variations'], answer: 1, prize: 500000 },
  { q: 'What is "formant tuning" in classical singing?', options: ['Matching resonance to vowel', 'Tuning the larynx', 'Adjusting breath pressure', 'Changing pitch'], answer: 0, prize: 750000 },
  { q: 'Who is considered the father of modern vocal pedagogy?', options: ['Manuel Garcia II', 'Lamperti', 'Lilli Lehmann', 'Enrico Caruso'], answer: 0, prize: 1000000 }
];

var PRIZE_LADDER = [100, 200, 300, 500, 1000, 2000, 5000, 10000, 25000, 50000, 75000, 100000, 250000, 500000, 750000, 1000000];

var quizState = { q: 0, score: 0, lifelines: { fifty: true, skip: true, double: true }, over: false };

function startMillionaire() {
  quizState = { q: 0, score: 0, lifelines: { fifty: true, skip: true, double: true }, over: false };
  showQuizQuestion();
}

function showQuizQuestion() {
  var qs = QUIZ_QUESTIONS;
  var qi = quizState.q;
  if (qi >= qs.length) { quizWin(); return; }
  var q = qs[qi];
  var c = document.getElementById('q-c');
  var h = '';
  h += '<button class="btn btn-w" style="width:auto;padding:var(--s2) var(--s4);min-height:36px;font-size:var(--xs)" onclick="go(\'quiz\')">← Quit</button>';
  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin:var(--s4) 0">';
  h += '<span class="text-xs text-muted">Question ' + (qi + 1) + ' of ' + qs.length + '</span>';
  h += '<span class="text-xs text-gold text-bold">₦' + PRIZE_LADDER[qi].toLocaleString() + '</span></div>';
  h += '<div class="pr mb-4"><div class="pr-f" style="width:' + ((qi + 1) / qs.length * 100) + '%"></div></div>';
  h += '<div class="millionaire-q">';
  h += '<div class="millionaire-q-num">Question ' + (qi + 1) + '</div>';
  h += '<div class="millionaire-q-text">' + q.q + '</div>';
  for (var i = 0; i < q.options.length; i++) {
    h += '<div class="qo" id="qo-' + i + '" onclick="answerQuiz(' + i + ')"><div class="qr"></div><span>' + String.fromCharCode(65 + i) + '. ' + q.options[i] + '</span></div>';
  }
  h += '</div>';
  h += '<div class="millionaire-lifelines">';
  h += '<div class="lifeline-btn ' + (quizState.lifelines.fifty ? '' : 'used') + '" onclick="useLifeline(\'fifty\')">50:50</div>';
  h += '<div class="lifeline-btn ' + (quizState.lifelines.skip ? '' : 'used') + '" onclick="useLifeline(\'skip\')">Skip</div>';
  h += '<div class="lifeline-btn ' + (quizState.lifelines.double ? '' : 'used') + '" onclick="useLifeline(\'double\')">Double</div>';
  h += '</div>';
  c.innerHTML = h;
}

function answerQuiz(idx) {
  if (quizState.over) return;
  var q = QUIZ_QUESTIONS[quizState.q];
  var correct = idx === q.answer;
  for (var i = 0; i < 4; i++) {
    var el = document.getElementById('qo-' + i);
    if (i === q.answer) el.classList.add('ok');
    else if (i === idx && !correct) el.classList.add('err');
    el.classList.add('dis');
  }
  if (correct) {
    quizState.score = q.prize;
    toast('Correct! ₦' + q.prize.toLocaleString(), 'ok');
    setTimeout(function() { quizState.q++; showQuizQuestion(); }, 1500);
  } else {
    quizState.over = true;
    toast('Wrong! Game over.', 'err');
    setTimeout(function() {
      var safeScore = 0;
      for (var m = 0; m < SAFE_MILESTONES.length; m++) {
        if (quizState.q > SAFE_MILESTONES[m]) safeScore = PRIZE_LADDER[SAFE_MILESTONES[m]];
      }
      if (safeScore > U.quizHighScore) U.quizHighScore = safeScore;
      save();
      showQuizResult(safeScore);
    }, 1500);
  }
}

function useLifeline(type) {
  if (!quizState.lifelines[type] || quizState.over) return;
  var q = QUIZ_QUESTIONS[quizState.q];
  if (type === 'fifty') {
    var removed = 0;
    for (var i = 0; i < 4 && removed < 2; i++) {
      if (i !== q.answer) {
        var el = document.getElementById('qo-' + i);
        if (el) { el.style.opacity = '0.2'; el.style.pointerEvents = 'none'; removed++; }
      }
    }
  } else if (type === 'skip') {
    quizState.q++;
    showQuizQuestion();
  } else if (type === 'double') {
    q.prize = q.prize * 2;
  }
  quizState.lifelines[type] = false;
  var btns = document.querySelectorAll('.lifeline-btn');
  if (type === 'fifty') btns[0].classList.add('used');
  if (type === 'skip') btns[1].classList.add('used');
  if (type === 'double') btns[2].classList.add('used');
}

function quizWin() {
  var finalPrize = PRIZE_LADDER[PRIZE_LADDER.length - 1];
  if (finalPrize > U.quizHighScore) U.quizHighScore = finalPrize;
  save();
  showQuizResult(finalPrize);
}

function showQuizResult(score) {
  var c = document.getElementById('q-c');
  var h = '';
  h += '<div class="text-center" style="padding:var(--s7) 0">';
  h += '<div style="font-size:3rem;margin-bottom:var(--s3)">' + (score >= 1000000 ? '🏆' : score >= 10000 ? '🎉' : '💪') + '</div>';
  h += '<h1 style="font-size:var(--2xl);font-weight:900;margin-bottom:var(--s2)">₦' + score.toLocaleString() + '</h1>';
  h += '<p class="text-muted mb-4">' + (score >= 1000000 ? 'You are a music genius!' : score >= 10000 ? 'Great job! Keep studying.' : 'Keep learning. You will get there.') + '</p>';
  h += '<button class="btn btn-p" onclick="startMillionaire()">Play Again</button>';
  h += '<button class="btn btn-g" onclick="go(\'quiz\')">Back</button></div>';
  c.innerHTML = h;
}

// ============================================================
// RESET
// ============================================================
function resetAll() {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  U = {
    name: U.name, email: U.email, xp: 0, level: 1, sessions: 0, streak: 0,
    lastPractice: null,
    skills: {airflow: 0, source: 0, resonance: 0, articulation: 0, ear: 0, mix: 0, performance: 0, theory: 0, sight: 0, style: 0},
    completed: [], completedSongs: [], completedQuizzes: [], badges: [],
    vocalLoad: 0, maxLoad: 100, weaknessHistory: [], diagnosticResults: [],
    quizHighScore: 0, millionaireLevel: 0,
    srsData: {}, streak: 0, lastPractice: null
  };
  save();
  toast('Progress reset', 'info');
  go('home');
}

// ============================================================
// INIT
// ============================================================
if (!AUTH.init()) {
  // Show auth screen first
  go('auth');
} else {
  go('home');
}
</script>
