<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Singer OS</title>
<style>
:root {
  /* OKLCH Color System - perceptually uniform */
  --bg: oklch(0.10 0.01 260);
  --bg2: oklch(0.13 0.01 260);
  --card: oklch(0.17 0.01 260);
  --card2: oklch(0.20 0.01 260);
  --border: oklch(0.28 0.01 260);
  --border-hi: oklch(0.35 0.02 260);
  
  /* Primary - Indigo */
  --pri: oklch(0.65 0.20 270);
  --pri-hi: oklch(0.72 0.18 270);
  --pri-dim: oklch(0.55 0.22 270);
  --pri-glow: oklch(0.65 0.20 270 / 0.15);
  --pri-glow-hi: oklch(0.65 0.20 270 / 0.30);
  
  /* Semantic */
  --ok: oklch(0.72 0.18 145);
  --ok-dim: oklch(0.60 0.20 145);
  --warn: oklch(0.78 0.16 60);
  --err: oklch(0.65 0.20 25);
  --gold: oklch(0.82 0.16 95);
  
  /* Text */
  --tx: oklch(0.95 0.01 260);
  --tx2: oklch(0.70 0.01 260);
  --tx3: oklch(0.48 0.01 260);
  
  /* Typography Scale */
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  --xs: 0.6875rem;
  --sm: 0.8125rem;
  --base: 0.9375rem;
  --md: 1.0625rem;
  --lg: 1.25rem;
  --xl: 1.5rem;
  --2xl: 1.875rem;
  --3xl: 2.25rem;
  
  /* Spacing Scale */
  --s1: 4px;
  --s2: 8px;
  --s3: 12px;
  --s4: 16px;
  --s5: 20px;
  --s6: 24px;
  --s7: 32px;
  --s8: 40px;
  --s9: 48px;
  
  /* Radius */
  --r-sm: 8px;
  --r: 12px;
  --r-lg: 16px;
  --r-xl: 20px;
  --r-full: 9999px;
  
  /* Elevation */
  --shadow-sm: 0 1px 3px oklch(0 0 0 / 0.3);
  --shadow: 0 4px 12px oklch(0 0 0 / 0.4);
  --shadow-lg: 0 8px 24px oklch(0 0 0 / 0.5);
  --shadow-glow: 0 0 20px var(--pri-glow);
  
  /* Motion */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --dur-fast: 150ms;
  --dur: 250ms;
  --dur-slow: 400ms;
}

/* Font Loading */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html {
  color-scheme: dark;
  -webkit-tap-highlight-color: transparent;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--tx);
  font-size: var(--base);
  line-height: 1.6;
  min-height: 100vh;
  padding-bottom: 88px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Reduced Motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: var(--r-full); }

/* Screen System */
.sc { display: none; min-height: calc(100vh - 88px); }
.sc.active { display: block; animation: fadeIn var(--dur) var(--ease-out) both; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

@keyframes glow {
  0%, 100% { box-shadow: 0 0 8px var(--pri-glow); }
  50% { box-shadow: 0 0 20px var(--pri-glow-hi); }
}

@keyframes confetti {
  0% { transform: scale(0) rotate(0deg); opacity: 0; }
  50% { transform: scale(1.2) rotate(180deg); opacity: 1; }
  100% { transform: scale(1) rotate(360deg); opacity: 1; }
}

/* Top Bar */
.tb {
  position: sticky;
  top: 0;
  z-index: 100;
  background: oklch(0.10 0.01 260 / 0.92);
  backdrop-filter: blur(12px) saturate(1.4);
  -webkit-backdrop-filter: blur(12px) saturate(1.4);
  border-bottom: 1px solid var(--border);
  padding: var(--s4) var(--s5);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.tb-t {
  font-size: var(--md);
  font-weight: 800;
  letter-spacing: -0.02em;
}
.tb-r {
  font-size: var(--sm);
  color: var(--gold);
  font-weight: 600;
  font-family: var(--font-mono);
}

/* Screen Padding */
.sp { padding: var(--s5) var(--s4) var(--s9); max-width: 540px; margin: 0 auto; }

/* Bottom Navigation */
.bn {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  background: oklch(0.12 0.01 260 / 0.95);
  backdrop-filter: blur(16px) saturate(1.6);
  -webkit-backdrop-filter: blur(16px) saturate(1.6);
  border-top: 1px solid var(--border);
  height: 72px;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.bn-in {
  display: flex;
  justify-content: space-around;
  align-items: center;
  height: 100%;
  max-width: 500px;
  margin: 0 auto;
  padding: 0 var(--s2);
}
.bn-i {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: var(--s2) var(--s3);
  color: var(--tx3);
  font-size: var(--xs);
  font-weight: 600;
  text-decoration: none;
  border-radius: var(--r-sm);
  transition: color var(--dur-fast), background var(--dur-fast);
  min-width: 48px;
  min-height: 48px;
  justify-content: center;
  cursor: pointer;
  border: none;
  background: none;
  font-family: var(--font);
}
.bn-i:hover { color: var(--tx2); background: oklch(0.20 0.01 260 / 0.5); }
.bn-i.on { color: var(--pri); }
.bn-i.on:hover { background: var(--pri-glow); }
.bn-ic {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 1px;
}
.bn-ic svg { width: 22px; height: 22px; stroke-width: 1.8; }

/* Cards */
.c {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: var(--s5);
  margin-bottom: var(--s3);
  transition: border-color var(--dur), box-shadow var(--dur), transform var(--dur-fast);
}
.c:hover {
  border-color: var(--border-hi);
  box-shadow: var(--shadow-sm);
}
.c:active { transform: scale(0.98); }
.c-a { border-color: oklch(0.65 0.20 270 / 0.25); background: linear-gradient(135deg, var(--card), oklch(0.65 0.20 270 / 0.04)); }
.c-a:hover { border-color: oklch(0.65 0.20 270 / 0.4); box-shadow: var(--shadow-glow); }
.c-g { border-color: oklch(0.82 0.16 95 / 0.2); }
.c-g:hover { border-color: oklch(0.82 0.16 95 / 0.35); }
.c-ok { border-color: oklch(0.72 0.18 145 / 0.25); }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--s2);
  padding: var(--s3) var(--s5);
  border-radius: var(--r);
  font-weight: 700;
  font-size: var(--sm);
  font-family: var(--font);
  width: 100%;
  margin-bottom: var(--s2);
  cursor: pointer;
  border: none;
  transition: all var(--dur-fast) var(--ease-out);
  min-height: 48px;
  letter-spacing: -0.01em;
  position: relative;
  overflow: hidden;
}
.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, oklch(1 0 0 / 0.08), transparent);
  pointer-events: none;
}
.btn:hover { transform: translateY(-1px); }
.btn:active { transform: translateY(0) scale(0.98); }
.btn:disabled { opacity: 0.4; pointer-events: none; }

.btn-p {
  background: linear-gradient(135deg, var(--pri), var(--pri-dim));
  color: #fff;
  box-shadow: 0 2px 8px var(--pri-glow);
}
.btn-p:hover { box-shadow: 0 4px 16px var(--pri-glow-hi); }

.btn-s {
  background: linear-gradient(135deg, var(--ok), var(--ok-dim));
  color: oklch(0.15 0.01 260);
  box-shadow: 0 2px 8px oklch(0.72 0.18 145 / 0.2);
}
.btn-s:hover { box-shadow: 0 4px 16px oklch(0.72 0.18 145 / 0.3); }

.btn-g {
  background: transparent;
  color: var(--tx2);
  border: 1px solid var(--border);
}
.btn-g:hover { background: var(--card2); color: var(--tx); border-color: var(--border-hi); }

.btn-w {
  background: transparent;
  color: var(--tx3);
  border: 1px solid var(--border);
  font-weight: 500;
}
.btn-w:hover { color: var(--tx2); }

/* Tags */
.tag {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: var(--r-full);
  font-size: var(--xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.tag-p { background: var(--pri-glow); color: var(--pri-hi); }
.tag-s { background: oklch(0.72 0.18 145 / 0.1); color: var(--ok); }
.tag-g { background: oklch(0.82 0.16 95 / 0.1); color: var(--gold); }
.tag-w { background: oklch(0.78 0.16 60 / 0.1); color: var(--warn); }

/* Progress Bars */
.pr {
  height: 8px;
  background: var(--border);
  border-radius: var(--r-full);
  overflow: hidden;
  position: relative;
}
.pr-f {
  height: 100%;
  background: linear-gradient(90deg, var(--pri-dim), var(--pri));
  border-radius: var(--r-full);
  transition: width var(--dur-slow) var(--ease-out);
  position: relative;
}
.pr-f::after {
  content: '';
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 20px;
  background: linear-gradient(90deg, transparent, oklch(1 0 0 / 0.15));
  border-radius: var(--r-full);
}
.pr-ok .pr-f { background: linear-gradient(90deg, var(--ok-dim), var(--ok)); }
.pr-g .pr-f { background: linear-gradient(90deg, oklch(0.70 0.14 95), var(--gold)); }

/* List Items */
.li {
  display: flex;
  align-items: center;
  gap: var(--s4);
  padding: var(--s4);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  margin-bottom: var(--s2);
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-out);
  min-height: 56px;
}
.li:hover {
  border-color: var(--border-hi);
  background: var(--card2);
  transform: translateX(2px);
}
.li:active { transform: scale(0.98); }
.li-ic {
  width: 44px;
  height: 44px;
  border-radius: var(--r);
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--pri-glow);
  color: var(--pri);
  flex-shrink: 0;
  font-weight: 800;
  font-size: var(--sm);
}
.li-ic svg { width: 20px; height: 20px; stroke-width: 1.8; }
.li-b { flex: 1; min-width: 0; }
.li-t { font-weight: 700; font-size: var(--sm); letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.li-sub { font-size: var(--xs); color: var(--tx3); margin-top: 1px; }
.li-r { font-size: var(--xs); color: var(--gold); font-weight: 700; font-family: var(--font-mono); flex-shrink: 0; }

/* Sections */
.sec { margin-bottom: var(--s6); }
.sec-h {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: var(--s3);
}
.sec-t {
  font-size: var(--xs);
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--tx3);
}

/* Hero */
.hero { padding: var(--s5) 0 var(--s6); }
.hero h1 {
  font-size: var(--2xl);
  font-weight: 900;
  letter-spacing: -0.03em;
  line-height: 1.1;
  margin-bottom: var(--s2);
}
.hero p { color: var(--tx2); font-size: var(--sm); }

/* Quiz Options */
.qo {
  display: flex;
  align-items: center;
  gap: var(--s3);
  padding: var(--s4);
  border: 2px solid var(--border);
  border-radius: var(--r);
  margin-bottom: var(--s2);
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-out);
  min-height: 52px;
}
.qo:hover { border-color: var(--border-hi); background: var(--card); }
.qo.sel { border-color: var(--pri); background: var(--pri-glow); }
.qo.ok { border-color: var(--ok); background: oklch(0.72 0.18 145 / 0.08); }
.qo.err { border-color: var(--err); background: oklch(0.65 0.20 25 / 0.08); }
.qo.dis { pointer-events: none; opacity: 0.6; }
.qr {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid var(--border);
  flex-shrink: 0;
  transition: all var(--dur-fast);
  display: flex;
  align-items: center;
  justify-content: center;
}
.qo.sel .qr { background: var(--pri); border-color: var(--pri); }
.qo.ok .qr { background: var(--ok); border-color: var(--ok); }
.qo.err .qr { background: var(--err); border-color: var(--err); }
.qr::after {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #fff;
  opacity: 0;
  transition: opacity var(--dur-fast);
}
.qo.sel .qr::after, .qo.ok .qr::after, .qo.err .qr::after { opacity: 1; }

/* Exercise Steps */
.es {
  display: flex;
  gap: var(--s3);
  padding: var(--s4) 0;
  border-bottom: 1px solid var(--border);
  align-items: flex-start;
}
.es:last-child { border-bottom: none; }
.esn {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--xs);
  font-weight: 800;
  background: var(--pri-glow);
  color: var(--pri);
  flex-shrink: 0;
  margin-top: 2px;
}
.est { flex: 1; }
.est p { font-size: var(--sm); color: var(--tx2); line-height: 1.5; }

/* Toast / Feedback */
.ft {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-200%);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: var(--s3) var(--s5);
  z-index: 9999;
  font-size: var(--sm);
  font-weight: 600;
  box-shadow: var(--shadow-lg);
  transition: transform var(--dur) var(--ease-spring);
  max-width: 90vw;
  text-align: center;
}
.ft.show { transform: translateX(-50%) translateY(0); }
.ft-ok { border-color: var(--ok); color: var(--ok); }
.ft-err { border-color: var(--err); color: var(--err); }
.ft-info { border-color: var(--pri); color: var(--pri); }

/* Grid helpers */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s2); }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: var(--s2); }

/* Text helpers */
.text-center { text-align: center; }
.text-sm { font-size: var(--sm); }
.text-xs { font-size: var(--xs); }
.text-muted { color: var(--tx3); }
.text-pri { color: var(--pri); }
.text-ok { color: var(--ok); }
.text-gold { color: var(--gold); }
.text-warn { color: var(--warn); }
.text-err { color: var(--err); }
.text-bold { font-weight: 700; }
.text-mono { font-family: var(--font-mono); }
.mb-1 { margin-bottom: var(--s1); }
.mb-2 { margin-bottom: var(--s2); }
.mb-3 { margin-bottom: var(--s3); }
.mb-4 { margin-bottom: var(--s4); }
.mt-2 { margin-top: var(--s2); }
.mt-4 { margin-top: var(--s4); }
.gap-2 { gap: var(--s2); }
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.w-full { width: 100%; }

/* Input */
.input {
  width: 100%;
  padding: var(--s3) 0;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--tx);
  font-family: var(--font);
  font-size: var(--base);
  transition: border-color var(--dur-fast);
  outline: none;
}
.input:focus { border-color: var(--pri); }
.input::placeholder { color: var(--tx3); }
label {
  display: block;
  font-size: var(--xs);
  color: var(--tx3);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: var(--s1);
}

/* Badge */
.badge {
  display: inline-flex;
  align-items: center;
  gap: var(--s1);
  padding: var(--s1) var(--s3);
  border-radius: var(--r-full);
  font-size: var(--xs);
  font-weight: 700;
  background: var(--card2);
  border: 1px solid var(--border);
}

/* Level indicator */
.level-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--pri), var(--pri-dim));
  color: #fff;
  font-weight: 900;
  font-size: var(--sm);
  box-shadow: 0 2px 8px var(--pri-glow);
}

/* Streak flame */
.streak { display: inline-flex; align-items: center; gap: var(--s1); }

/* Achievement popup */
.achieve {
  position: fixed;
  inset: 0;
  z-index: 10000;
  display: none;
  align-items: center;
  justify-content: center;
  background: oklch(0 0 0 / 0.7);
  backdrop-filter: blur(4px);
}
.achieve.show { display: flex; }
.achieve-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: var(--s7);
  text-align: center;
  max-width: 320px;
  animation: confetti 0.5s var(--ease-spring) both;
}
.achieve-icon { font-size: 3rem; margin-bottom: var(--s3); }
.achieve-title { font-size: var(--lg); font-weight: 800; margin-bottom: var(--s2); }
.achieve-desc { color: var(--tx2); font-size: var(--sm); margin-bottom: var(--s5); }

/* Vocal load bar */
.vocal-load {
  height: 6px;
  background: var(--border);
  border-radius: var(--r-full);
  overflow: hidden;
  margin: var(--s2) 0;
}
.vocal-load-f {
  height: 100%;
  border-radius: var(--r-full);
  transition: width var(--dur-slow) var(--ease-out), background var(--dur);
}
.vocal-load-f.ok { background: var(--ok); }
.vocal-load-f.warn { background: var(--warn); }
.vocal-load-f.danger { background: var(--err); }

/* Divider */
.hr { height: 1px; background: var(--border); margin: var(--s4) 0; }

/* Reference box */
.ref-box {
  background: oklch(0.65 0.20 270 / 0.06);
  border: 1px solid oklch(0.65 0.20 270 / 0.15);
  border-radius: var(--r);
  padding: var(--s4);
  margin: var(--s3) 0;
}
.ref-box-title {
  font-size: var(--xs);
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--pri);
  margin-bottom: var(--s2);
}

/* Song card */
.song-card {
  display: flex;
  align-items: center;
  gap: var(--s4);
  padding: var(--s4);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  margin-bottom: var(--s2);
  cursor: pointer;
  transition: all var(--dur-fast);
}
.song-card:hover { border-color: var(--border-hi); background: var(--card2); }
.song-art {
  width: 52px;
  height: 52px;
  border-radius: var(--r-sm);
  background: linear-gradient(135deg, var(--pri-glow), var(--card2));
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: var(--lg);
}
.song-info { flex: 1; min-width: 0; }
.song-title { font-weight: 700; font-size: var(--sm); }
.song-artist { font-size: var(--xs); color: var(--tx3); }
.song-tags { display: flex; gap: var(--s1); margin-top: var(--s1); flex-wrap: wrap; }

/* Difficulty dots */
.dots { display: flex; gap: 3px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
.dot.filled { background: var(--pri); }
.dot.ok { background: var(--ok); }

/* Coach message */

dentify',ts:{top:4,bottom:4},q:'Most common time signature in pop?'},{type:'identify',ts:{top:3,bottom:4},q:'A waltz is in which time signature?'},{type:'calculate',ts:{top:4,bottom:4},q:'In 4/4, how many quarter notes per bar?'},{type:'feel',ts:{top:4,bottom:4},q:'Which feels like a march: strong-weak-strong-weak?'}];if(l==='intermediate')return[{type:'compound',ts:{top:6,bottom:8},q:'In 6/8, how many BEATS per bar?'},{type:'compare',ts:{top:3,bottom:4},q:'Is 3/4 the same as 6/8?'}];return[{type:'universal',ts:{top:7,bottom:8},q:'In 7/8, common beat groupings?'},{type:'hack',ts:{top:4,bottom:4},q:'Change 4/4 to 4/8 — what changes?'}];},formatQuestion:function(q,level){var a=this.analyze(q.ts.top,q.ts.bottom);if(q.type==='identify'){var opts=[a.display];var all=['4/4','3/4','2/4','6/8','9/8','5/4','7/8'];for(var i=0;i<all.length&&opts.length<4;i++)if(opts.indexOf(all[i])===-1&&Math.random()>0.5)opts.push(all[i]);while(opts.length<4){var r=all[Math.floor(Math.random()*all.length)];if(opts.indexOf(r)===-1)opts.push(r);}return{question:q.q,type:'mc',options:opts,correct:a.display,explanation:a.display+': '+a.feel};}if(q.type==='calculate')return{question:q.q,type:'num',correct:q.ts.top,explanation:'Top number = '+q.ts.top+' '+a.bottomNoteName+' notes per bar.'};if(q.type==='compound'){var beats=q.ts.top/3;return{question:q.q,type:'num',correct:beats,explanation='Compound: top = divisions. Each beat = 3 divisions. '+q.ts.top+' ÷ 3 = '+beats+' beats.'};}if(q.type==='feel')return{question:q.q,type:'mc',options:['4/4','3/4','6/8','2/4'],correct:a.display,explanation:a.feel};if(q.type==='compare')return{question:q.q,type:'mc',options:['Yes — both have 6','No — 3/4 has 3 quarter beats, 6/8 has 2 dotted-quarter beats','Yes — both in 3/4'],correct:'No — 3/4 has 3 quarter beats, 6/8 has 2 dotted-quarter beats',explanation:'3/4 = SIMPLE (3 beats, each divides into 2). 6/8 = COMPOUND (2 beats, each divides into 3).';}if(q.type==='universal')return{question:q.q,type:'mc',options:[ function renderTSLesson(container,id){var L={ts_lesson_1:{title:'What Do the Numbers Mean?',body:'<p>A time signature has <b>two numbers</b>, stacked.</p><div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:var(--s4);margin:var(--s3) 0;text-align:center"><div style="font-size:2.5rem;font-weight:900;color:var(--pri)">4</div><div style="font-size:2.5rem;font-weight:900;color:var(--tx2)">4</div><div style="border-top:2px solid var(--border);margin:var(--s2) 0"></div><div style="font-size:var(--sm)"><b>Top</b> = how many | <b>Bottom</b> = what note value</div></div><p><b>4/4</b> = 4 quarter notes per bar. <b>3/4</b> = 3 quarter notes. <b>6/8</b> = 6 eighth notes.</p><div style="background:oklch(0.72 0.18 145/0.08);border:1px solid var(--ok);border-radius:var(--r);padding:var(--s3);margin-top:var(--s3)"><b>💡 The Rule:</b> Top = how many. Bottom = what note. Everything else follows.</div>'},ts_lesson_2:{title:'Simple vs Compound',body:'<p>The real difference is how the <b>beat divides</b>.</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--s3);margin:var(--s3) 0"><div style="background:var(--bg);border:1px solid var(--ok);border-radius:var(--r);padding:var(--s3);text-align:center"><div style="font-weight:800;color:var(--ok)">SIMPLE</div><div style="font-size:var(--sm)">Beat divides into <b>2</b></div><div style="font-size:0.7rem;color:var(--tx3)">4/4, 3/4, 2/4</div></div><div style="background:var(--bg);border:1px solid var(--gold);border-radius:var(--r);padding:var(--s3);text-align:center"><div style="font-weight:800;color:var(--gold)">COMPOUND</div><div style="font-size:var(--sm)">Beat divides into <b>3</b></div><div style="font-size:0.7rem;color:var(--tx3)">6/8, 9/8, 12/8</div></div></div><p><b>Simple (4/4):</b> Count <b>1</b> and <b>2</b> and <b>3</b> and <b>4</b> and.</p><p><b>Compound (6/8):</b> Count <b>1</b> 2 3 <b>4</b> 5 6. Two BIG beats.</p><div style="background:oklch(0.78 0.16 60/0.08);border:1px soli // ============================================================
// AUTH GATE — Email + WhatsApp collection before access
// ============================================================
var AUTH = {
  isAuthed: false,
  email: '',
  whatsapp: '',
  ip: '',
  token: '',

  init: function() {
    // Check if already registered on this device
    try {
      var stored = localStorage.getItem('singerOS_auth');
      if (stored) {
        var d = JSON.parse(stored);
        if (d.email && d.token) {
          this.isAuthed = true;
          this.email = d.email;
          this.whatsapp = d.whatsapp || '';
          this.token = d.token;
          return true;
        }
      }
    } catch(e) {}
    return false;
  },

  register: function(email, whatsapp, name) {
    if (!email || email.indexOf('@') === -1) {
      toast('Enter a valid email address', 'err');
      return false;
    }
    if (!whatsapp || whatsapp.length < 10) {
      toast('Enter your WhatsApp number (with country code)', 'err');
      return false;
    }
    if (!name || name.length < 2) {
      toast('Enter your name', 'err');
      return false;
    }

    // Generate unique token
    var raw = email + Date.now() + Math.random().toString(36).slice(2);
    this.token = btoa(raw).slice(0, 24);
    this.email = email;
    this.whatsapp = whatsapp;
    this.isAuthed = true;

    // Store locally
    try {
      localStorage.setItem('singerOS_auth', JSON.stringify({
        email: email,
        whatsapp: whatsapp,
        name: name,
        token: this.token,
        registered: new Date().toISOString()
      }));
    } catch(e) {}

    // Submit to Google Sheet
    this.submitToSheet(name, email, whatsapp);

    // Get IP
    this.fetchIP();

    return true;
  },

  submitToSheet: function(name, email, whatsapp) {
    var self = this;
    var now = new Date().toISOString();
    var payload = {timestamp:now,name:name,email:email,whatsapp:whatsapp,ip:this.ip||'unknown',token:this.token};
    
    // Try localhost server first (when running on Coach Toby's device)
    var xhr = new XMLHttpRequest();
    xhr.open('POST', 'http://127.0.0.1:3000/submit', true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.timeout = 3000;
    xhr.onreadystatechange = function() {
      if (xhr.readyState === 4) {
        if (xhr.status === 200) {
          console.log('Registration saved to sheet via server');
        } else {
          // Server not available — store locally, flush later
          self.storePending(payload);
        }
      }
    };
    xhr.onerror = function() { self.storePending(payload); };
    xhr.ontimeout = function() { self.storePending(payload); };
    xhr.send(JSON.stringify(payload));
  },

  storePending: function(payload) {
    try {
      var pending = JSON.parse(localStorage.getItem('singerOS_pending_regs') || '[]');
      pending.push(payload);
      localStorage.setItem('singerOS_pending_regs', JSON.stringify(pending));
      console.log('Stored pending registration locally');
    } catch(e) {}
  },

  flushPending: function() {
    // Called periodically to flush pending registrations
    var pending = JSON.parse(localStorage.getItem('singerOS_pending_regs') || '[]');
    if (pending.length === 0) return;
    var self = this;
    pending.forEach(function(payload) {
      var xhr = new XMLHttpRequest();
      xhr.open('POST', 'http://127.0.0.1:3000/submit', true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.timeout = 5000;
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
          // Remove from pending
          var remaining = JSON.parse(localStorage.getItem('singerOS_pending_regs') || '[]');
          remaining = remaining.filter(function(p) { return p.token !== payload.token; });
          localStorage.setItem('singerOS_pending_regs', JSON.stringify(remaining));
        }
      };
      xhr.send(JSON.stringify(payload));
    });
  },

  fetchIP: function() {
    // Use a free IP API — best effort, non-blocking
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'https://api.ipify.org?format=json', true);
    xhr.timeout = 5000;
    xhr.onreadystatechange = function() {
      if (xhr.readyState === 4 && xhr.status === 200) {
        try {
          var d = JSON.parse(xhr.responseText);
          AUTH.ip = d.ip;
          // Store IP with auth
          var stored = JSON.parse(localStorage.getItem('singerOS_auth') || '{}');
          stored.ip = d.ip;
          localStorage.setItem('singerOS_auth', JSON.stringify(stored));
        } catch(e) {}
      }
    };
    xhr.send();
  },

  logout: function() {
    this.isAuthed = false;
    this.email = '';
    this.whatsapp = '';
    this.token = '';
    try { localStorage.removeItem('singerOS_auth'); } catch(e) {}
  },

  // Generate a shareable link with token embedded
  getLink: function() {
    var base = window.location.origin + window.location.pathname;
    return base + '?t=' + this.token + '&e=' + encodeURIComponent(this.email);
  },

  // Check if URL has a token (shared link)
  checkURLToken: function() {
    var params = new URLSearchParams(window.location.search);
    var t = params.get('t');
    var e = params.get('e');
    if (t && e) {
      // Someone visited via shared link — require their OWN registration
      // Do NOT auto-login with shared token
      return { shared: true, token: t, email: decodeURIComponent(e) };
    }
    return { shared: false };
  }
};
